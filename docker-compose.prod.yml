version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: recovery-journey-app:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://recovery:${DB_PASSWORD}@db:5432/recovery_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_PATIENT_EXPIRY: 30d
      JWT_FACILITATOR_EXPIRY: 8h
      PORT: "3000"
      ALLOWED_ORIGIN: https://rehab.recoverypsychcenter.com
    labels:
      - traefik.enable=true
      - traefik.http.routers.recovery.rule=Host(`rehab.recoverypsychcenter.com`)
      - traefik.http.routers.recovery.tls=true
      - traefik.http.routers.recovery.entrypoints=web,websecure
      - traefik.http.routers.recovery.tls.certresolver=mytlschallenge
      - traefik.http.services.recovery.loadbalancer.server.port=3000
    networks:
      - traefik
      - backend

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: recovery_db
      POSTGRES_USER: recovery
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recovery -d recovery_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

volumes:
  pgdata:

networks:
  # Connects to the existing Traefik instance running in /root/docker-compose.yml
  traefik:
    external: true
    name: root_default
  # Internal network — db is not exposed to Traefik
  backend:
    internal: true
