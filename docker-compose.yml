version: '3.9'

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: recovery_db
      POSTGRES_USER: recovery
      POSTGRES_PASSWORD: recovery_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recovery -d recovery_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
